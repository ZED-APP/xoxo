<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>XO - ZED Games</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  text-align: center;
}

.container {
  text-align: center;
}

h1 {
  font-size: 40px;
  margin-bottom: 5px;
}

.subtitle {
  opacity: 0.8;
  margin-bottom: 20px;
}

/* Game card */
.card {
  padding: 25px;
  border-radius: 20px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.15);

  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* Board */
#game {
  display: grid;
  grid-template-columns: repeat(3, 90px);
  grid-template-rows: repeat(3, 90px);
  gap: 10px;
  justify-content: center;
  margin: 20px auto;
}

/* Cells */
.cell {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;

  font-size: 40px;
  font-weight: bold;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  transition: 0.2s;
}

.cell:hover {
  transform: scale(1.08);
  background: rgba(59,130,246,0.3);
}

/* Status */
#status {
  font-size: 20px;
  margin-top: 15px;
  font-weight: bold;
}

/* Button */
button {
  margin-top: 15px;
  padding: 12px 20px;
  border-radius: 12px;
  border: none;

  cursor: pointer;
  font-size: 16px;
  font-weight: bold;

  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  color: white;

  transition: 0.25s;
}

button:hover {
  transform: scale(1.05);
  background: linear-gradient(135deg, #22c55e, #3b82f6);
}
</style>
</head>

<body>

<div class="container">

<h1>ZED Games</h1>
<div class="subtitle">XO - لعبة تيك تاك تو</div>

<div class="card">

  <div id="game"></div>

  <div id="status">دور اللاعب: X</div>

  <button id="restart">إعادة اللعب 🔄</button>

</div>

</div>

<script>
const game = document.getElementById('game');
const statusDiv = document.getElementById('status');
const restartBtn = document.getElementById('restart');

let currentPlayer = 'X';
let cells = Array(9).fill('');
let gameOver = false;

const winPatterns = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function render() {
  game.innerHTML = '';
  cells.forEach((val, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.textContent = val;
    cell.onclick = () => makeMove(i);
    game.appendChild(cell);
  });
}

function makeMove(index) {
  if (cells[index] || gameOver) return;

  cells[index] = currentPlayer;
  render();

  if (checkWin()) {
    statusDiv.textContent = `🎉 اللاعب ${currentPlayer} فاز!`;
    gameOver = true;
  } else if (cells.every(c => c)) {
    statusDiv.textContent = '🔁 تعادل!';
    gameOver = true;
  } else {
    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    statusDiv.textContent = `دور اللاعب: ${currentPlayer}`;
  }
}

function checkWin() {
  return winPatterns.some(p => {
    const [a,b,c] = p;
    return cells[a] && cells[a] === cells[b] && cells[a] === cells[c];
  });
}

restartBtn.onclick = () => {
  cells = Array(9).fill('');
  currentPlayer = 'X';
  gameOver = false;
  statusDiv.textContent = `دور اللاعب: ${currentPlayer}`;
  render();
};

render();
</script>

</body>
</html>
