<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>XO - لعبة تيك تاك تو</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      text-align: center;
      background: #f2f2f2;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 30px;
      color: #333;
    }

    #game {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 5px;
      justify-content: center;
      margin: 30px auto;
    }

    .cell {
      background-color: white;
      border: 2px solid #ccc;
      font-size: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.3s;
    }

    .cell:hover {
      background-color: #eee;
    }

    #status {
      font-size: 24px;
      margin-top: 20px;
    }

    #restart {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>ZED Games</h1>
<br></br>
  <h1>XO - لعبة تيك تاك تو</h1>
  <div id="game"></div>
  <div id="status">دور اللاعب: X</div>
  <button id="restart">إعادة اللعب 🔄</button>

  <script>
    const game = document.getElementById('game');
    const statusDiv = document.getElementById('status');
    const restartBtn = document.getElementById('restart');

    let currentPlayer = 'X';
    let cells = Array(9).fill('');
    let gameOver = false;

    const winPatterns = [
      [0,1,2], [3,4,5], [6,7,8], // Rows
      [0,3,6], [1,4,7], [2,5,8], // Columns
      [0,4,8], [2,4,6]           // Diagonals
    ];

    function render() {
      game.innerHTML = '';
      cells.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.textContent = val;
        cell.addEventListener('click', () => makeMove(i));
        game.appendChild(cell);
      });
    }

    function makeMove(index) {
      if (cells[index] || gameOver) return;
      cells[index] = currentPlayer;
      render();
      if (checkWin()) {
        statusDiv.textContent = `🎉 اللاعب ${currentPlayer} فاز!`;
        gameOver = true;
      } else if (cells.every(cell => cell)) {
        statusDiv.textContent = '🔁 تعادل!';
        gameOver = true;
      } else {
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        statusDiv.textContent = `دور اللاعب: ${currentPlayer}`;
      }
    }

    function checkWin() {
      return winPatterns.some(pattern => {
        const [a, b, c] = pattern;
        return cells[a] && cells[a] === cells[b] && cells[a] === cells[c];
      });
    }

    restartBtn.addEventListener('click', () => {
      cells = Array(9).fill('');
      currentPlayer = 'X';
      gameOver = false;
      statusDiv.textContent = `دور اللاعب: ${currentPlayer}`;
      render();
    });

    render();
  </script>

</body>
</html>
